name: "Frontend tests"

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  SKIP_ENV_VALIDATION: "true"
  NODE_VERSION: 24
  PNPM_VERSION: 10

jobs:
  lint-staff-ui:
    name: Staff ui lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: frontend/pnpm-lock.yaml
          cache: "pnpm"

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile --ignore-scripts

      - uses: dtinth/setup-github-actions-caching-for-turbo@v1

      - name: Lint staff ui
        working-directory: frontend
        run: |
          pnpm codegen
          pnpm tsc:check --filter=staff...
          pnpm lint
          pnpm lint:css --filter=staff...
          pnpm format:check --filter=staff...

  test-staff-ui:
    name: Staff ui unit test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: frontend/pnpm-lock.yaml
          cache: "pnpm"

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile --ignore-scripts

      - uses: dtinth/setup-github-actions-caching-for-turbo@v1

      - name: Test staff ui
        working-directory: frontend
        run: |
          pnpm codegen
          pnpm test:coverage --filter=staff...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: cov-staff-${{ github.run_id }}
          path: ./frontend/apps/staff/coverage/lcov.info
          if-no-files-found: error
          retention-days: 1

  lint-customer-ui:
    name: Customer ui lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: frontend/pnpm-lock.yaml
          cache: "pnpm"

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile --ignore-scripts

      - uses: dtinth/setup-github-actions-caching-for-turbo@v1

      - name: Lint ui
        working-directory: frontend
        run: |
          pnpm codegen
          pnpm tsc:check --filter=customer...
          pnpm lint
          pnpm lint:css --filter=customer...
          pnpm format:check --filter=customer...

  test-customer-ui:
    name: Customer ui unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: frontend/pnpm-lock.yaml
          cache: "pnpm"

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile --ignore-scripts

      - uses: dtinth/setup-github-actions-caching-for-turbo@v1

      - name: Test ui
        working-directory: frontend
        run: |
          pnpm codegen
          pnpm test:coverage --filter=customer...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: cov-customer-${{ github.run_id }}
          path: ./frontend/apps/customer/coverage/lcov.info
          if-no-files-found: error
          retention-days: 1

  sonarcloud-staff:
    needs: test-staff-ui
    name: "SonarCloud scan (staff)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v7
        with:
          name: cov-staff-${{ github.run_id }}
          path: ./frontend/apps/staff/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          projectBaseDir: ./frontend/apps/staff
        if: ${{ github.event_name != 'pull_request' || (! contains(fromJSON(vars.BOTS), github.event.pull_request.user.login)) }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sonarcloud-customer:
    needs: test-customer-ui
    name: "SonarCloud scan (customer)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v7
        with:
          name: cov-customer-${{ github.run_id }}
          path: ./frontend/apps/customer/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          projectBaseDir: ./frontend/apps/customer
        if: ${{ github.event_name != 'pull_request' || (! contains(fromJSON(vars.BOTS), github.event.pull_request.user.login)) }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
