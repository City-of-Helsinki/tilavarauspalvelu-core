services:

  db:
    container_name: tvp-db
    image: "postgis/postgis:13-3.3-alpine"
    profiles:
      - backend
    environment:
      POSTGRES_USER: tvp
      POSTGRES_PASSWORD: tvp
      POSTGRES_DB: tvp
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "tvp"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5555:5432"
    volumes:
      - tvp-postgres:/var/lib/postgresql/data

  redis:
    container_name: tvp-redis
    image: "redis:7-alpine"
    profiles:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:6379:6379"

  backend:
    container_name: tvp-core
    image: tvp-core
    profiles:
      - backend
    build:
      context: backend/
      dockerfile: docker/Dockerfile
      args:
        DEPS: main,admin,celery,test,lint
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - backend/.env
    environment:
      DJANGO_SETTINGS_ENVIRONMENT: Docker
    ports:
      - "8000:8000"
    volumes:
      - tvp-media:/media
    entrypoint: /tvp/docker/entrypoint_dev.sh

  customer:
    container_name: tvp-customer
    image: tvp-customer
    profiles:
      - frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: "ui"
        NEXT_PUBLIC_BASE_URL: ""
        NEXT_PUBLIC_SOURCE_VERSION: "local"
        NEXT_PUBLIC_SOURCE_BRANCH_NAME: "main"
        EMAIL_VARAAMO_EXT_LINK: "https://lomake.hel.fi/varaamo-palaute"
        CI: false
    environment:
      TILAVARAUS_API_URL: "http://host.docker.internal:8000"
#    env_file:
#      - apps/ui/.env.local
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  admin:
    container_name: tvp-admin
    image: tvp-admin
    profiles:
      - frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: "admin-ui"
        NEXT_PUBLIC_BASE_URL: "/kasittely"
        NEXT_PUBLIC_SOURCE_VERSION: "local"
        NEXT_PUBLIC_SOURCE_BRANCH_NAME: "main"
        EMAIL_VARAAMO_EXT_LINK: "https://lomake.hel.fi/varaamo-palaute"
        CI: false
    environment:
      TILAVARAUS_API_URL: "http://host.docker.internal:8000"
    env_file:
      - apps/admin-ui/.env.local
    ports:
      - "127.0.0.1:3001:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery:
    container_name: tvp-celery
    image: tvp-celery
    profiles:
      - backend
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    build:
      context: backend/
      dockerfile: docker/Dockerfile
      args:
        DEPS: main,admin,celery,test,lint
    env_file:
      - backend/.env
    environment:
      DJANGO_SETTINGS_ENVIRONMENT: Docker
    entrypoint: /tvp/docker/worker.sh

volumes:
  tvp-postgres:
  tvp-media:

networks:
  default:
    name: helsinki
