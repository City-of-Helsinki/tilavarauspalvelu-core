packages:
  - apps/*
  - packages/*

publicHoistPattern:
  - '*prettier*'
  - '*import-in-the-middle*'
  - '*require-in-the-middle*'

overrides:
  ajv@<8.18.0: 8.18.0
  brace-expansion@<1.1.13: 1.1.13
  brace-expansion@>=2.0.0 <2.0.3: 2.0.3
  cookie@<0.7.0: 0.7.0
  diff@>=4.0.0 <4.0.4: 4.0.4
  flatted@<=3.4.1: 3.4.2
  immutable@<3.8.3: 3.8.3
  immutable@>=5.0.0 <5.1.5: 5.1.5
  js-cookie@<=3.0.5: 3.0.7
  lodash@<=4.17.22: 4.18.1
  lodash-es@<4.18.1: 4.18.1
  minimatch@<3.1.4: 3.1.4
  minimatch@>=9.0.0 <9.0.7: 9.0.7
  minimatch@>=10.0.0 <10.2.3: 10.2.3
  picomatch@<2.3.2: 2.3.2
  picomatch@>=4.0.0 <4.0.4: 4.0.4
  rollup@<4.59.0: 4.59.0
  vite@<7.3.2: 7.3.2
  yaml@>=2.0.0 <2.8.3: 2.8.3

# Don't allow dependencies to be used before they have been released for at least 2 weeks
minimumReleaseAge: 20160
# Add any security exceptions here and bump them manually
minimumReleaseAgeExclude:
  # brace-expansion: GHSA-f886-m6hf-6m8v (needs >=1.1.13 and >=2.0.3)
  - brace-expansion
  # happy-dom: GHSA-w4gp-fjgq-3q4g (needs >=20.8.9)
  - 'happy-dom@20.8.9'
  - '@happy-dom/jest-environment@20.8.9'
  # js-cookie: GHSA-qjx8-664m-686j (needs >=3.0.7)
  - js-cookie@3.0.7
  # lodash: GHSA-4mwj-38mr-27j5, GHSA-jf85-cpcp-j695, GHSA-35jh-r3h4-6jhm, GHSA-nxhq-r7db-7g3t (needs >=4.18.1)
  - lodash@4.18.1
  - lodash-es@4.18.1
  # picomatch: GHSA-3v7f-55p6-f55p, GHSA-c2c7-rcm5-vvqj (needs >=2.3.2 and >=4.0.4)
  - picomatch
  # vite: GHSA-p9ff-h696-f583, GHSA-v2wj-q39q-566r, GHSA-4w7w-66w2-5vf9 (needs >=7.3.2)
  - vite@7.3.2
  # yaml: GHSA-48c2-rrv3-qjmp (needs >=2.8.3)
  - yaml@2.8.3

allowBuilds:
  '@parcel/watcher': false
  '@sentry/cli': false
  core-js: false
  esbuild: false
  sharp: false
