packages:
  - apps/*
  - packages/*

publicHoistPattern:
  - '*prettier*'
  - '*import-in-the-middle*'
  - '*require-in-the-middle*'
  - '*hds*'

overrides:
  ajv@<8.18.0: 8.18.0
  brace-expansion@<1.1.13: 1.1.13
  brace-expansion@>=2.0.0 <2.0.3: 2.0.3
  cookie@<0.7.0: 0.7.0
  diff@>=4.0.0 <4.0.4: 4.0.4
  flatted@<=3.4.1: 3.4.2
  immutable@<3.8.3: 3.8.3
  immutable@>=5.0.0 <5.1.5: 5.1.5
  js-cookie@<=3.0.5: 3.0.7
  lodash@<=4.17.22: 4.18.1
  lodash-es@<4.18.1: 4.18.1
  minimatch@<3.1.4: 3.1.4
  minimatch@>=9.0.0 <9.0.7: 9.0.7
  minimatch@>=10.0.0 <10.2.3: 10.2.3
  picomatch@<2.3.2: 2.3.2
  picomatch@>=4.0.0 <4.0.4: 4.0.4
  rollup@<4.59.0: 4.59.0
  vite@<7.3.2: 7.3.2
  yaml@>=2.0.0 <2.8.3: 2.8.3

# Don't allow dependencies to be used before they have been released for at least 1 week
minimumReleaseAge: 10080

# Add minimumReleaseAge exceptions here (security or intentionally pinned versions) and bump them manually
minimumReleaseAgeExclude:
  - '@next/env@16.2.9'
  - '@next/swc-darwin-arm64@16.2.9'
  - '@next/swc-darwin-x64@16.2.9'
  - '@next/swc-linux-arm64-gnu@16.2.9'
  - '@next/swc-linux-arm64-musl@16.2.9'
  - '@next/swc-linux-x64-gnu@16.2.9'
  - '@next/swc-linux-x64-musl@16.2.9'
  - '@next/swc-win32-arm64-msvc@16.2.9'
  - '@next/swc-win32-x64-msvc@16.2.9'
  - next@16.2.9

peerDependencyRules:
  allowedVersions:
    # HDS 6 transitively depends on these packages which haven't declared React 19 support
    '@react-spring/web>react': '*'
    '@react-spring/web>react-dom': '*'
    '@react-spring/animated>react': '*'
    '@react-spring/core>react': '*'
    '@react-spring/shared>react': '*'
    'react-popper>react': '*'
    'react-popper>react-dom': '*'

allowBuilds:
  '@parcel/watcher': false
  '@sentry/cli': false
  core-js: false
  esbuild: false
  sharp: false
